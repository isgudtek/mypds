<div class="app-tile {% if not apps.aturi %}app-tile--off{% endif %}">
  <div class="app-tile__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
      <polyline points="15 3 21 3 21 9"/>
      <line x1="10" y1="14" x2="21" y2="3"/>
    </svg>
  </div>
  <div class="app-tile__name" style="color:var(--text)">aturi</div>
  <div class="app-tile__status" style="color:var(--green);">plugin</div>
  <form method="post" action="/apps/aturi/toggle" style="margin-top:6px;">
    <button class="app-toggle {% if apps.aturi %}app-toggle--on{% endif %}" type="submit" style="cursor:pointer;">
      {{ 'on' if apps.aturi else 'off' }}
    </button>
  </form>
</div>
