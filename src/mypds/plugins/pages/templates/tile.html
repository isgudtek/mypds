<div class="app-tile {% if not apps.pages %}app-tile--off{% endif %}">
  <div class="app-tile__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
    </svg>
  </div>
  <div class="app-tile__name"><a href="/pages" style="color:var(--text)">pages</a></div>
  <div class="app-tile__status" style="color:var(--cyan);">com.whtwnd.blog.entry</div>
  <form method="post" action="/apps/pages/toggle" style="margin-top:6px;">
    <button class="app-toggle {% if apps.pages %}app-toggle--on{% endif %}" type="submit" style="cursor:pointer;">
      {{ 'on' if apps.pages else 'off' }}
    </button>
  </form>
</div>
