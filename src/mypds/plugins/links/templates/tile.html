<div class="app-tile {% if not apps.links %}app-tile--off{% endif %}">
  <div class="app-tile__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
  </div>
  <div class="app-tile__name"><a href="/links" style="color:var(--text)">links</a></div>
  <div class="app-tile__status" style="color:var(--cyan);">pub.social.linktree</div>
  <form method="post" action="/apps/links/toggle" style="margin-top:6px;">
    <button class="app-toggle {% if apps.links %}app-toggle--on{% endif %}" type="submit" style="cursor:pointer;">
      {{ 'on' if apps.links else 'off' }}
    </button>
  </form>
</div>
