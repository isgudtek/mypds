{% extends "node_base.html" %}
{% block title %}portal · enter{% endblock %}

{% block content %}
<div style="min-height:65vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;">
  <div style="width:100%;max-width:400px;">

    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:56px;height:56px;border-radius:50%;background:color-mix(in srgb,var(--cyan) 12%,var(--surface));
                  border:1px solid color-mix(in srgb,var(--cyan) 30%,transparent);
                  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
             fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
          <line x1="6" y1="1" x2="6" y2="4"/>
          <line x1="10" y1="1" x2="10" y2="4"/>
          <line x1="14" y1="1" x2="14" y2="4"/>
        </svg>
      </div>
      <h1 style="font-size:1.15rem;font-weight:700;margin:0 0 6px;">enter the portal</h1>
      <p style="font-size:.78rem;color:var(--dim);margin:0;line-height:1.55;">
        prove you own a bluesky identity<br>get a private space with the node owner
      </p>
    </div>

    {% if error %}
    <div style="background:color-mix(in srgb,var(--red) 12%,transparent);
                border:1px solid color-mix(in srgb,var(--red) 25%,transparent);
                border-radius:6px;padding:9px 14px;font-size:.78rem;color:var(--red);margin-bottom:16px;">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/portal/enter">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px 20px 16px;">
        <label style="display:block;font-size:.68rem;font-family:var(--mono);color:var(--dim);
                      text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;">
          bluesky handle
        </label>
        <input type="text" name="handle" placeholder="you.bsky.social"
               autocomplete="off" autocorrect="off" spellcheck="false"
               style="width:100%;background:var(--surface2);border:1px solid var(--border);
                      border-radius:5px;padding:9px 12px;color:var(--text);font-size:.88rem;
                      font-family:var(--mono);box-sizing:border-box;outline:none;
                      transition:border-color .15s;"
               onfocus="this.style.borderColor='var(--cyan)'"
               onblur="this.style.borderColor='var(--border)'" autofocus>
        <button type="submit" style="width:100%;margin-top:12px;background:var(--cyan);color:#000;
                border:none;border-radius:5px;padding:10px;font-size:.85rem;font-weight:700;
                cursor:pointer;transition:opacity .15s;"
                onmouseover="this.style.opacity='.82'" onmouseout="this.style.opacity='1'">
          continue →
        </button>
      </div>
    </form>

    <p style="text-align:center;font-size:.68rem;color:var(--dim);margin-top:14px;line-height:1.6;">
      no password · no account · proof by bluesky post
    </p>

  </div>
</div>
{% endblock %}
