<div class="app-tile {% if not apps.portal %}app-tile--off{% endif %}">
  <div class="app-tile__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
  </div>
  <div class="app-tile__name"><a href="/portal" style="color:var(--text)">portal</a></div>
  <div class="app-tile__status" style="color:var(--cyan);">did handshake</div>
  <form method="post" action="/apps/portal/toggle" style="margin-top:6px;">
    <button class="app-toggle {% if apps.portal %}app-toggle--on{% endif %}" type="submit" style="cursor:pointer;">
      {{ 'on' if apps.portal else 'off' }}
    </button>
  </form>
</div>
