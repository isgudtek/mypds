<div class="app-tile {% if not apps.places %}app-tile--off{% endif %}">
  <div class="app-tile__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
      <circle cx="12" cy="10" r="3"/>
    </svg>
  </div>
  <div class="app-tile__name"><a href="/places" style="color:var(--text)">places</a></div>
  <div class="app-tile__status" style="color:var(--cyan);">pub.places.pin</div>
  <form method="post" action="/apps/places/toggle" style="margin-top:6px;">
    <button class="app-toggle {% if apps.places %}app-toggle--on{% endif %}" type="submit" style="cursor:pointer;">
      {{ 'on' if apps.places else 'off' }}
    </button>
  </form>
</div>
