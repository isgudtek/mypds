<div class="app-tile {% if not apps.hello %}app-tile--off{% endif %}">
  <div class="app-tile__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div class="app-tile__name"><a href="/hello" style="color:var(--text)">hello</a></div>
  <div class="app-tile__status" style="color:var(--green);">plugin</div>
  <form method="post" action="/apps/hello/toggle" style="margin-top:6px;">
    <button class="app-toggle {% if apps.hello %}app-toggle--on{% endif %}" type="submit" style="cursor:pointer;">
      {{ 'on' if apps.hello else 'off' }}
    </button>
  </form>
</div>
