<div class="app-tile {% if not apps.dropbox %}app-tile--off{% endif %}">
  <div class="app-tile__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </div>
  <div class="app-tile__name"><a href="/dropbox/inbox" style="color:var(--text)">dropbox</a></div>
  <div class="app-tile__status" style="color:var(--cyan);">file inbox</div>
  <form method="post" action="/apps/dropbox/toggle" style="margin-top:6px;">
    <button class="app-toggle {% if apps.dropbox %}app-toggle--on{% endif %}" type="submit" style="cursor:pointer;">
      {{ 'on' if apps.dropbox else 'off' }}
    </button>
  </form>
</div>
