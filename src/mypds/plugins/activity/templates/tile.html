<div class="app-tile {% if not apps.activity %}app-tile--off{% endif %}">
  <div class="app-tile__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8"  y1="2" x2="8"  y2="6"/>
      <line x1="3"  y1="10" x2="21" y2="10"/>
    </svg>
  </div>
  <div class="app-tile__name"><a href="/activity" style="color:var(--text)">activity</a></div>
  <div class="app-tile__status" style="color:var(--cyan);">atproto records</div>
  <form method="post" action="/apps/activity/toggle" style="margin-top:6px;">
    <button class="app-toggle {% if apps.activity %}app-toggle--on{% endif %}" type="submit" style="cursor:pointer;">
      {{ 'on' if apps.activity else 'off' }}
    </button>
  </form>
</div>
