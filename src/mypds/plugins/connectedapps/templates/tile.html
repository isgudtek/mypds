<div class="app-tile">
  <div class="app-tile__icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <line x1="8" y1="21" x2="16" y2="21"/>
      <line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
  </div>
  <div class="app-tile__name"><a href="/connected-apps" style="color:var(--text)">connected apps</a></div>
  <div class="app-tile__status" style="color:var(--cyan);">oauth log</div>
  <div class="app-tile__toggle" style="opacity:.4; font-size:.65rem; color:var(--dim);">always on</div>
</div>
