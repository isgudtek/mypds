<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2FA Verify · millipds</title>
<link rel="stylesheet" href="/static/node.css">
<style>
.totp-wrap { max-width: 400px; margin: 80px auto; padding: 0 16px; }
.totp-box  { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; }
.totp-box h1 { margin: 0 0 6px; font-size: 1.25rem; }
.totp-box p  { margin: 0 0 24px; color: var(--dim); font-size: .875rem; }
.otp-icon { text-align: center; font-size: 2.5rem; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="totp-wrap">
  <div class="totp-box">
    <div class="otp-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="11" width="14" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        <circle cx="12" cy="16" r="1" fill="currentColor"/>
      </svg>
    </div>
    <h1>Two-Factor Authentication</h1>
    <p>Enter the 6-digit code from your authenticator app.</p>

    {% if error %}
    <div class="alert alert--error" style="margin-bottom:16px">{{ error }}</div>
    {% endif %}

    <form method="post" action="/totp/verify">
      <input type="hidden" name="t" value="{{ token }}">
      <div class="form-group">
        <label>Authentication code</label>
        <input class="form-control" type="text" name="code" inputmode="numeric" pattern="[0-9 ]*"
               maxlength="7" placeholder="000 000" autocomplete="one-time-code" autofocus required
               style="text-align:center;font-size:1.5rem;letter-spacing:.25em;font-family:var(--mono)">
      </div>
      <button class="btn btn--primary" type="submit" style="width:100%;justify-content:center;">
        Verify →
      </button>
    </form>

    <div style="margin-top:24px;font-size:.75rem;color:var(--dim);font-family:var(--mono);">
      <a href="/login" style="color:var(--dim);">← back to login</a>
    </div>
  </div>
</div>
</body>
</html>
