{% extends "node_base.html" %}
{% block title %}unlock · {{ page.title }}{% endblock %}

{% block content %}
<div class="page-gate">
  <div class="page-gate__card">

    <div class="page-gate__icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <div class="page-gate__title">{{ page.title }}</div>
    <div class="page-gate__sub">This page is password protected.</div>

    {% if error %}
    <div class="alert alert--error" style="margin-bottom:16px; text-align:left;">{{ error }}</div>
    {% endif %}

    <form method="post" action="/p/{{ page.slug }}/unlock">
      <div class="form-group" style="text-align:left;">
        <label>Password</label>
        <input class="form-control" type="password" name="password"
               placeholder="Enter password" autofocus required>
      </div>
      <button class="btn btn--primary" type="submit" style="width:100%; cursor:pointer;">
        Unlock page
      </button>
    </form>

    <div style="margin-top:16px;">
      <a href="/" style="font-size:.8rem; color:var(--muted);">back to home</a>
    </div>

  </div>
</div>
{% endblock %}
