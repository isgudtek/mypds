{% extends "node_base.html" %}
{% block title %}compose{% endblock %}

{% block content %}
<div class="container">
  <div class="compose-wrap">

    <div style="margin-bottom:24px;">
      <h1 style="font-size:1.3rem; font-weight:700;">Compose</h1>
      <div class="text-muted mt-8">Write a post to your ATProto feed.</div>
    </div>

    {% if error %}
    <div class="alert alert--error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert--success">{{ success }}</div>
    {% endif %}

    <div class="compose-box">
      <form method="post" action="/compose" id="compose-form" enctype="multipart/form-data">
        <div class="form-group">
          <label>Post text</label>
          <textarea class="form-control" name="text" id="post-text"
                    placeholder="What's on your mind?"
                    maxlength="300" rows="5" required autofocus></textarea>
        </div>
        <div class="form-group">
          <label style="display:flex; align-items:center; gap:6px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            Attach image
            <span style="font-size:.72rem; color:var(--muted); font-weight:400;">(optional, 1 image max)</span>
          </label>
          <input type="file" name="image" id="compose-image" accept="image/*" style="font-size:.82rem;">
          <div id="compose-preview" style="display:none; margin-top:8px;">
            <img id="compose-preview-img" src="" alt="preview"
                 style="max-height:180px; border-radius:var(--r); border:1px solid var(--border);">
            <button type="button" id="compose-clear-img"
                    style="display:block; margin-top:4px; font-size:.75rem; color:var(--muted);
                           background:none; border:none; cursor:pointer; padding:0;">
              remove image
            </button>
          </div>
        </div>
        <div class="form-row">
          <button class="btn btn--primary" type="submit" style="cursor:pointer;">Post →</button>
          <a class="btn btn--ghost" href="/dashboard" style="cursor:pointer;">cancel</a>
          <span class="char-count" id="char-count">0 / 300</span>
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const ta = document.getElementById('post-text');
const cc = document.getElementById('char-count');
ta.addEventListener('input', () => {
  const n = ta.value.length;
  cc.textContent = n + ' / 300';
  cc.className = 'char-count' + (n > 280 ? ' warn' : '') + (n >= 300 ? ' over' : '');
});

// Image preview
const imgInput = document.getElementById('compose-image');
const preview = document.getElementById('compose-preview');
const previewImg = document.getElementById('compose-preview-img');
const clearBtn = document.getElementById('compose-clear-img');

imgInput.addEventListener('change', () => {
  const file = imgInput.files[0];
  if (!file) { preview.style.display = 'none'; return; }
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  preview.style.display = 'block';
});

clearBtn.addEventListener('click', () => {
  imgInput.value = '';
  previewImg.src = '';
  preview.style.display = 'none';
});
</script>
{% endblock %}
